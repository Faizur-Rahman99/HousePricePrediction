<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>House Price Prediction</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🏠 House Price Prediction</h1>

        <form id="prediction-form">
            <label for="MedInc">Median Income</label>
            <input
                type="number"
                id="MedInc"
                step="0.1"
                required
            >

            <label for="HouseAge">House Age</label>
            <input
                type="number"
                id="HouseAge"
                step="0.1"
                required
            >

            <label for="AveRooms">Average Rooms</label>
            <input
                type="number"
                id="AveRooms"
                step="0.1"
                required
            >

            <label for="AveBedrms">Average Bedrooms</label>
            <input
                type="number"
                id="AveBedrms"
                step="0.1"
                required
            >

            <label for="Population">Population</label>
            <input
                type="number"
                id="Population"
                required
            >

            <label for="AveOccup">Average Occupancy</label>
            <input
                type="number"
                id="AveOccup"
                step="0.1"
                required
            >

            <label for="Latitude">Latitude</label>
            <input
                type="number"
                id="Latitude"
                step="0.0001"
                required
            >

            <label for="Longitude">Longitude</label>
            <input
                type="number"
                id="Longitude"
                step="0.0001"
                required
            >

            <button id="predict-btn" type="submit">
                Predict Price
            </button>

        </form>
        <h2 id="result"></h2>


    </div>

    <script src="script.js"></script>

</body>

</html>
